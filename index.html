<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Finder</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }
    #map {
      width: 100%;
      height: calc(100vh - 70px);
    }
    #detail-panel {
      width: 300px;
      background: #fafafa;
      border-left: 2px solid #ddd;
      padding: 10px;
      overflow-y: auto;
    }
    .filters {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 10px;
      background: #fff;
      border-bottom: 2px solid #ddd;
    }
    #typeRadioGroup {
      display: flex;
      gap: 12px;
    }
  </style>
</head>

<body>
  <div class="filters">
    <strong>Category:</strong>
    <div id="typeRadioGroup"></div>

    <strong>Max Price:</strong>
    <span id="priceValue">$100</span>
    <input id="priceFilter" type="range" min="0" max="100" value="100" />

    <strong>Min Rating:</strong>
    <span id="ratingValue">0</span>
    <input id="ratingFilter" type="range" min="0" max="5" value="0" step="0.1" />
  </div>

  <div style="display:flex; width:100%;">
    <div id="map" style="flex:1;"></div>
    <div id="detail-panel">Click a restaurant</div>
  </div>

  <script type="module" src="./RestaurantFinder/index.ts"></script>
</body>
</html>
